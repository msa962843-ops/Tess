<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Pemutar Video...</title>
    <script type="text/javascript">
        // 1. Ambil path URL palsu yang diakses (Contoh: /stream/3v3l atau /stream/d/3v3l)
        var pathMentah = window.location.pathname;
        
        // 2. Amankan path tersebut ke dalam memori sesi browser agar bisa dibaca oleh index.html
        sessionStorage.setItem('redirect_path', pathMentah);
        
        // 3. Pecah segmen URL untuk mendeteksi nama repositori GitHub Anda secara dinamis
        var segmen = pathMentah.split('/').filter(Boolean);
        var namaRepo = segmen[0] || 'stream'; // Default ke 'stream' sesuai nama repositori Anda
        
        // 4. Lempar kembali secara instan ke halaman utama (index.html) tanpa merusak history navigasi
        window.location.replace('/' + namaRepo + '/');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-400 min-h-screen flex flex-col items-center justify-center font-sans">

    <div class="text-center space-y-4 animate-pulse">
        <div class="text-blue-500 text-3xl">
            <i class="fa-solid fa-circle-notch animate-spin"></i>
        </div>
        <div class="space-y-1">
            <p class="text-xs font-semibold text-gray-200 tracking-wide">MENGHUBUNGKAN KE SERVER</p>
            <p class="text-[10px] text-gray-500">Mempersiapkan jalur streaming aman, mohon tunggu...</p>
        </div>
    </div>

</body>
</html>
